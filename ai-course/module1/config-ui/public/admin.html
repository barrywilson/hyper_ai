<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Configuration Service</title>   
    <link rel="stylesheet" href="transitions.css">
</head>
<body>
    <app-layout footer='Configuration Service Admin Dashboard' id="appLayout">
        <app-header heading="⚙️ Admin Dashboard" subheading="Configuration Management">           
            <div slot="actions">
                <a href="index.html">← Back to App</a>
            </div>
        </app-header>

        <main>
            <!-- Dashboard Stats -->
            <div class="stats">
                <div class="stat-card">
                    <h3>Total Configs</h3>
                    <div class="value" id="totalConfigs">0</div>
                </div>
                <div class="stat-card">
                    <h3>Last Updated</h3>
                    <div class="value" id="lastUpdated" style="font-size: 16px;">—</div>
                </div>
            </div>

            <!-- Search & Actions -->
            <div class="dashboard-header">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search by key name...">
                </div>
                <button class="btn btn-primary" id="addConfigBtn">
                    ➕ New Configuration
                </button>
            </div>

            

            <!-- Configurations Table -->
            <div class="table-wrapper">
                <config-table id="config-table"></config-table>
            </div>
        </main>
       

    </app-layout>

    <!-- Edit/Add Modal -->
    <config-modal id="configModalElement"></config-modal>

    <script src="api-client.js"></script>
    <script src="elements/app-header.js"></script>    
    <script src="elements/config-table.js"></script>
    <script src="elements/config-modal.js"></script>
    <script src="elements/app-layout.js"></script>
    <script>
        // Initialize API with resolver pattern
        const api = createApi({
            namespace: 'ai.course.config',
            version: 'v1',
            baseUrl: '/api'
        });

        let allConfigs = [];

        // DOM Elements
        const configModalElement = document.getElementById('configModalElement');
        const configTable = document.getElementById('config-table');
        const appLayout = document.getElementById('appLayout');
        const searchInput = document.getElementById('searchInput');
        const addConfigBtn = document.getElementById('addConfigBtn');

        // Initialize
                // Initialize
        document.addEventListener('layout-loaded', () => {
            loadConfigurations();
            setupEventListeners();
        });
       

        function setupEventListeners() {
            addConfigBtn.addEventListener('click', () => configModalElement.openAdd());
            searchInput.addEventListener('input', filterConfigs);
            
            // Listen for config-action events
            document.addEventListener('config-action', (e) => {
                const { action, id } = e.detail;
                if (action === 'edit') {
                    const config = allConfigs.find(c => c.id === id);
                    if (config) configModalElement.openEdit(config);
                } else if (action === 'delete') {
                    deleteConfig(id);
                }
            });

            configModalElement.addEventListener('save-config', handleFormSubmit);
        }

        async function loadConfigurations() {
            appLayout.ShowMessage('Loading configurations...');
            appLayout.ShowProgress(true);
            
            try {
                allConfigs = await api('list');
                configTable.data = allConfigs;
                document.getElementById('totalConfigs').textContent = allConfigs.length;
            
                if (allConfigs.length > 0) {
                    const latest = new Date(allConfigs[0].updated_at);
                    document.getElementById('lastUpdated').textContent = latest.toLocaleDateString();
                }
                
            } catch (error) {
                console.error('Error loading configurations:', error);
                appLayout.ShowMessage('Failed to load configurations: ' + error.message);
            } finally {
                appLayout.ShowProgress(false);
                appLayout.ShowMessage('');
            }
        }

        function filterConfigs() {
            const query = searchInput.value.toLowerCase();
            const filtered = allConfigs.filter(config => 
                config.key.toLowerCase().includes(query)
            );
            configTable.data = filtered;
        }

        async function handleFormSubmit(e) {
            const { id, key, value, description } = e.detail;
            
            if (!key || !value) {
                appLayout.ShowMessage('Key name and value are required', 'error');
                return;
            }
            
            try {
                if (id) {
                    await api('update', {
                        id: parseInt(id),
                        value,
                        description: description || null
                    });
                    appLayout.ShowMessage('Configuration updated successfully!', 'success');
                } else {
                    await api('create', {
                        key,
                        value,
                        description: description || null
                    });
                    appLayout.ShowMessage('Configuration created successfully!', 'success');
                }
                
                configModalElement.close();
                loadConfigurations();
            } catch (error) {
                appLayout.ShowMessage('Error: ' + error.message, 'error');
            }
        }

        async function deleteConfig(id) {
            if (!confirm('Are you sure you want to delete this configuration?')) return;
            
            try {
                await api('delete', { id: parseInt(id) });
                appLayout.ShowMessage('Configuration deleted successfully!', 'success');                
                loadConfigurations();
            } catch (error) {
                appLayout.ShowMessage('Error: ' + error.message, 'error');
            }
        }

      

      
        
    </script>
</body>
</html>
