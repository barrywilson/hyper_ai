<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Configuration Service</title>   
    <link rel="stylesheet" href="transitions.css">
</head>
<body>
    <app-layout footer='Configuration Service Admin Dashboard' id="appLayout">
        <app-header heading="⚙️ Admin Dashboard" subheading="Configuration Management">           
            <div slot="actions">
                <a href="index.html">← Back to App</a>
            </div>
        </app-header>

        <main>
            <!-- Dashboard Stats -->
            <div class="stats">
                <div class="stat-card">
                    <h3>Total Configs</h3>
                    <div class="value" id="totalConfigs">0</div>
                </div>
                <div class="stat-card">
                    <h3>Last Updated</h3>
                    <div class="value" id="lastUpdated" style="font-size: 16px;">—</div>
                </div>
            </div>

            <!-- Search & Actions -->
            <div class="dashboard-header">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search by key name...">
                </div>
                <button class="btn btn-primary" id="addConfigBtn">
                    ➕ New Configuration
                </button>
            </div>

            

            <!-- Configurations Table -->
            <div class="table-wrapper">
                <config-table id="config-table"></config-table>
            </div>
        </main>
       

    </app-layout>

    <!-- Edit/Add Modal -->
    <div id="configModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" id="closeModal">&times;</button>
            <div class="modal-header" id="modalTitle">Add New Configuration</div>
            
            <form id="configForm">
                <input type="hidden" id="configId">
                
                <div class="form-group">
                    <label for="key">Key Name *</label>
                    <input type="text" id="key" required placeholder="e.g., app_name">
                </div>

                <div class="form-group">
                    <label for="configValue">Value *</label>
                    <textarea id="configValue" required placeholder="Configuration value"></textarea>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" placeholder="Optional description">
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Configuration</button>
                </div>
            </form>
        </div>
    </div>

    <script src="api-client.js"></script>
    <script src="elements/app-header.js"></script>    
    <script src="elements/config-table.js"></script>
    <script src="elements/app-layout.js"></script>
    <script>
        // Initialize API with resolver pattern
        const api = createApi({
            namespace: 'ai.course.config',
            version: 'v1',
            baseUrl: '/api'
        });

        let allConfigs = [];

        // DOM Elements
        const configModal = document.getElementById('configModal');
        const configForm = document.getElementById('configForm');
        const configTable = document.getElementById('config-table');
        const appLayout = document.getElementById('appLayout');
        const searchInput = document.getElementById('searchInput');
        const addConfigBtn = document.getElementById('addConfigBtn');
        const closeModalBtn = document.getElementById('closeModal');
        const cancelBtn = document.getElementById('cancelBtn');

        // Initialize
                // Initialize
        document.addEventListener('layout-loaded', () => {
            loadConfigurations();
            setupEventListeners();
        });
       

        function setupEventListeners() {
            addConfigBtn.addEventListener('click', openAddModal);
            closeModalBtn.addEventListener('click', closeModal);
            cancelBtn.addEventListener('click', closeModal);
            configForm.addEventListener('submit', handleFormSubmit);
            searchInput.addEventListener('input', filterConfigs);
            
            // Listen for config-action events
            document.addEventListener('config-action', (e) => {
                const { action, id } = e.detail;
                if (action === 'edit') {
                    openEditModal(id);
                } else if (action === 'delete') {
                    deleteConfig(id);
                }
            });
            
            // Close modal on outside click
            window.addEventListener('click', (e) => {
                if (e.target === configModal) closeModal();
            });
        }

        async function loadConfigurations() {
            appLayout.ShowMessage('Loading configurations...');
            appLayout.ShowProgress(true);
            
            try {
                allConfigs = await api('list');
                configTable.data = allConfigs;
                document.getElementById('totalConfigs').textContent = allConfigs.length;
            
                if (allConfigs.length > 0) {
                    const latest = new Date(allConfigs[0].updated_at);
                    document.getElementById('lastUpdated').textContent = latest.toLocaleDateString();
                }
                
            } catch (error) {
                console.error('Error loading configurations:', error);
                appLayout.ShowMessage('Failed to load configurations: ' + error.message);
            } finally {
                appLayout.ShowProgress(false);
                appLayout.ShowMessage('');
            }
        }

        function filterConfigs() {
            const query = searchInput.value.toLowerCase();
            const filtered = allConfigs.filter(config => 
                config.key.toLowerCase().includes(query)
            );
            configTable.data = filtered;
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add New Configuration';
            configForm.reset();
            document.getElementById('configId').value = '';
            configModal.classList.add('active');
            document.getElementById('key').focus();
        }

        async function openEditModal(id) {
            const config = allConfigs.find(c => c.id === id);
            if (!config) return;
            
            document.getElementById('modalTitle').textContent = 'Edit Configuration';
            document.getElementById('configId').value = config.id;
            document.getElementById('key').value = config.key;
            document.getElementById('key').disabled = true;
            document.getElementById('configValue').value = config.value;
            document.getElementById('description').value = config.description || '';
            
            configModal.classList.add('active');
            document.getElementById('configValue').focus();
        }

        function closeModal() {
            configModal.classList.remove('active');
            configForm.reset();
            document.getElementById('key').disabled = false;
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            
            const id = document.getElementById('configId').value;
            const key = document.getElementById('key').value.trim();
            const value = document.getElementById('configValue').value.trim();
            const description = document.getElementById('description').value.trim();
            
            if (!key || !value) {
                appLayout.ShowMessage('Key name and value are required', 'error');
                return;
            }
            
            try {
                if (id) {
                    await api('update', {
                        id: parseInt(id),
                        value,
                        description: description || null
                    });
                    appLayout.ShowMessage('Configuration updated successfully!', 'success');
                } else {
                    await api('create', {
                        key,
                        value,
                        description: description || null
                    });
                    appLayout.ShowMessage('Configuration created successfully!', 'success');
                }
                
                closeModal();
                loadConfigurations();
            } catch (error) {
                appLayout.ShowMessage('Error: ' + error.message, 'error');
            }
        }

        async function deleteConfig(id) {
            if (!confirm('Are you sure you want to delete this configuration?')) return;
            
            try {
                await api('delete', { id: parseInt(id) });
                appLayout.ShowMessage('Configuration deleted successfully!', 'success');                
                loadConfigurations();
            } catch (error) {
                appLayout.ShowMessage('Error: ' + error.message, 'error');
            }
        }

      

      
        
    </script>
</body>
</html>
