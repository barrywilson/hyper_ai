<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration Service</title>
    <link rel="stylesheet" href="transitions.css">

</head>

<body>

    <app-layout footer='Configuration Mainboard' id="appLayout">
        <app-header heading="Configuration Service" subheading="Manage your application configurations">
            <div slot="actions">
                <a href="admin.html">⚙️ Admin Dashboard</a>
            </div>
        </app-header>

        <main>
            <!-- Configurations Table -->
            <section class="table-section">
                <h2>Configurations (Read-Only)</h2>
                <app-message id="message"></app-message>
                <config-table id="config-table" readonly></config-table>
            </section>
        </main>
    </app-layout>


    </div>

    <script src="api-client.js"></script>
    <script src="elements/app-header.js"></script>
    <script src="elements/config-table.js"></script>
    <script src="elements/app-layout.js"></script>
    <script>
        /**
         * Configuration Service Web App - Read-Only View
         * 
         * Simple web interface for viewing configurations.
         * Uses server-side resolver pattern - all requests POST to resolver.
         */

        // Initialize configApi with resolver pattern
        const configApi = createApi({
            namespace: 'ai.course.config',
            version: 'v1',
            baseUrl: '/api'
        });

        // DOM Elements



        // Initialize
        document.addEventListener('layout-loaded', () => {
            loadConfigurations();
        });

        /**
         * Load all configurations from API
         */
        async function loadConfigurations() {

            const configTable = document.getElementById('config-table');
            const appLayout = document.getElementById('appLayout');
            try {

                appLayout.ShowMessage('Loading configurations...');
                appLayout.ShowProgress(true);

                const configurations = await configApi('list');

                if (configTable) {
                    configTable.data = configurations;
                }

            } catch (error) {
                console.error('Error loading configurations:', error);
                appLayout.ShowMessage('Failed to load configurations: ' + error.message);
            } finally {
                appLayout.ShowProgress(false);
                appLayout.ShowMessage('');
            }
        }
    </script>
</body>

</html>
