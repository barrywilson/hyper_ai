
services:
  db:
    image: mysql:8.0
    container_name: mysql_sample
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: sample_db
      MYSQL_USER: my_user
      MYSQL_PASSWORD: my_password
    ports:
      - "3306:3306"
    volumes:
      # Mount the initialization script
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      # Persist data across container restarts
      - mysql_data:/var/lib/mysql

  config-service:
    image: node:20
    container_name: config_service_dev
    working_dir: /workspace
    volumes:
      - ./config-service:/workspace
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=my_user
      - DB_PASSWORD=my_password
      - DB_NAME=sample_db
      - PORT=3000
      # Kafka Configuration (disabled by default)
      - KAFKA_ENABLED=false
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=config-service
      - KAFKA_TOPIC_CONFIG_EVENTS=config-events
      - KAFKA_TOPIC_CONFIG_CHANGES=config-changes
      - KAFKA_TOPIC_CONFIG_SNAPSHOTS=config-snapshots
    command: sh -c "npm install && npm run dev"
    depends_on:
      - db

  config-ui:
    image: node:20
    container_name: config_ui_dev
    working_dir: /workspace
    volumes:
      - ./config-ui:/workspace
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - API_URL=http://config-service:3000
      - KAFKA_BROKERS=kafka:9092
    command: sh -c "npm install && node server.js"
    depends_on:
      - config-service

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode (no ZooKeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

volumes:
  mysql_data:
