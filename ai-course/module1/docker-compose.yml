
services:
  db:
    image: mysql:8.0
    container_name: mysql_sample
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: sample_db
      MYSQL_USER: my_user
      MYSQL_PASSWORD: my_password
    ports:
      - "3306:3306"
    volumes:
      # Mount the initialization script
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      # Persist data across container restarts
      - mysql_data:/var/lib/mysql

  config-service:
    image: node:20
    container_name: config_service_dev
    working_dir: /workspace
    volumes:
      - ./config-service:/workspace
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=my_user
      - DB_PASSWORD=my_password
      - DB_NAME=sample_db
      - PORT=3000
      # Kafka Configuration (disabled by default)
      - KAFKA_ENABLED=false
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=config-service
      - KAFKA_TOPIC_CONFIG_EVENTS=config-events
      - KAFKA_TOPIC_CONFIG_CHANGES=config-changes
      - KAFKA_TOPIC_CONFIG_SNAPSHOTS=config-snapshots
    command: sh -c "npm install && npm run dev"
    depends_on:
      - db

  config-ui:
    image: node:20
    container_name: config_ui_dev
    working_dir: /workspace
    volumes:
      - ./config-ui:/workspace
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - API_URL=http://config-service:3000
    command: sh -c "npm install && node server.js"
    depends_on:
      - config-service

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_COMPRESSION_TYPE: snappy
      KAFKA_LOG_RETENTION_MS: 2592000000
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

volumes:
  mysql_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
