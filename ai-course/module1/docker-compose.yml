
services:
  db:
    image: mysql:8.0
    container_name: mysql_sample
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: sample_db
      MYSQL_USER: my_user
      MYSQL_PASSWORD: my_password
    ports:
      - "3306:3306"
    volumes:
      # Mount the initialization script
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      # Persist data across container restarts
      - mysql_data:/var/lib/mysql

  config-service:
    image: node:20
    container_name: config_service_dev
    working_dir: /workspace
    volumes:
      - ./config-service:/workspace
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=my_user
      - DB_PASSWORD=my_password
      - DB_NAME=sample_db
      - PORT=3000
    command: sh -c "npm install && npm run dev"
    depends_on:
      - db

  config-ui:
    image: node:20
    container_name: config_ui_dev
    working_dir: /workspace
    volumes:
      - ./config-ui:/workspace
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - API_URL=http://config-service:3000
    command: sh -c "npm install && node server.js"
    depends_on:
      - config-service

volumes:
  mysql_data:
