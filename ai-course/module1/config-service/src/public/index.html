<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration Service</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Configuration Service</h1>
                <p>Manage your application configurations</p>
            </div>
            <div style="text-align: right;">
                <a href="admin.html" style="color: white; text-decoration: none; font-size: 14px; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 6px; display: inline-block;">⚙️ Admin Dashboard</a>
            </div>
        </header>

        <main>
            <!-- Configuration Form -->
            <section class="form-section">
                <h2 id="form-title">Add New Configuration</h2>
                <form id="config-form">
                    <input type="hidden" id="config-id">
                    
                    <div class="form-group">
                        <label for="config-key">Key *</label>
                        <input type="text" id="config-key" required placeholder="e.g., app_name">
                    </div>

                    <div class="form-group">
                        <label for="config-value">Value *</label>
                        <textarea id="config-value" required placeholder="Configuration value"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="config-description">Description</label>
                        <input type="text" id="config-description" placeholder="Optional description">
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="submit-btn">Add Configuration</button>
                        <button type="button" class="btn btn-secondary" id="cancel-btn" style="display: none;">Cancel</button>
                    </div>
                </form>
            </section>

            <!-- Configurations Table -->
            <section class="table-section">
                <h2>Configurations</h2>
                <div id="message" class="message"></div>
                <div id="loading" class="loading" style="display: none;">Loading...</div>
                
                <div class="table-wrapper">
                    <config-table id="config-table"></config-table>
                </div>
            </section>
        </main>
    </div>

    <script src="api-client.js"></script>
    <script src="config-table.js"></script>
    <script src="app.js"></script>
</body>
</html>
